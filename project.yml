name: LeanAI
options:
  bundleIdPrefix: com.akshat
  deploymentTarget:
    iOS: "17.0"

targets:
  LeanAI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - LeanAI
    info:
      path: LeanAI/Info.plist
      properties:
        CFBundleDisplayName: LeanAI
        UILaunchScreen: {}
        NSHealthShareUsageDescription: "LeanAI reads your step count to automatically track daily movement."
        NSHealthUpdateUsageDescription: "LeanAI may write workout data to Apple Health."
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshat.leanai
        SWIFT_VERSION: 5.10
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ZQ4799RVNQ
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LeanAI/LeanAI.entitlements
